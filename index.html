<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Presupuestos de Ascensores</title>
    <style>
        :root {
            --main-color: #e50009;
        }
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .btn-primary {
            background-color: var(--main-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background-color: #c20007;
        }
        h1 {
            color: var(--main-color);
        }
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 1000;
        }
        .modal-content {
            position: relative;
            width: 90%;
            max-width: 900px;
            height: 90%;
            margin: 2% auto;
            background-color: white;
            border-radius: 8px;
            overflow: hidden;
        }
        .close-modal {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 24px;
            color: var(--main-color);
            cursor: pointer;
            z-index: 1001;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Página de Demostración</h1>
        <p>Este botón emula la llamada desde WordPress al sistema de presupuestos.</p>
        <button class="btn-primary" id="openModal">Abrir Cotizador de Ascensores</button>
    </div>

    <div class="modal" id="presupuestoModal">
        <div class="modal-content">
            <span class="close-modal" id="closeModal">&times;</span>
            <iframe src="sistema/index.php" id="systemFrame"></iframe>
        </div>
    </div>

    <script>
        document.getElementById('openModal').addEventListener('click', function() {
            document.getElementById('presupuestoModal').style.display = 'block';
        });

        document.getElementById('closeModal').addEventListener('click', function() {
            document.getElementById('presupuestoModal').style.display = 'none';
        });

        window.addEventListener('click', function(event) {
            const modal = document.getElementById('presupuestoModal');
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        });
    </script>
</body>
</html>
